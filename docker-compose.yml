version: "3.9"

services:

  db:
    image: mysql:8.0
    container_name: orderflow-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orderdb
      MYSQL_USER: orderuser
      MYSQL_PASSWORD: orderpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "orderuser", "-porderpass" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: orderflow-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=orderuser
      - MYSQL_PASSWORD=orderpass
      - MYSQL_DATABASE=orderdb
      - GEMINI_API_KEY=AIzaSyBjm8I6isIpDLk2K32uBogope1SssN3trY
      - JWT_SECRET=orderflow-prod-jwt-secret-change-me
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: orderflow-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
